<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>True Energy VB</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #030303;
      color: #f5f5f5;
    }

    header {
      background: #000;
      border-bottom: 1px solid #b6ff00;
      padding: 30px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: 4px;
      color: white;
      cursor: pointer;
    }

    .logo span {
      color: #b6ff00;
    }

    nav {
      display: flex;
      gap: 45px;
    }

    nav button {
      background: none;
      border: none;
      color: white;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }

    nav button.active,
    nav button:hover {
      color: #b6ff00;
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 50px 25px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 35px;
      align-items: center;
    }

    h1 {
      font-size: 32px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-left: 5px solid #b6ff00;
      padding-left: 15px;
    }

    input {
      width: 320px;
      background: #111;
      border: 1px solid #333;
      color: white;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #b6ff00;
    }

    .matches {
      background: #101010;
      border: 1px solid #1f1f1f;
      border-radius: 12px;
      overflow: hidden;
    }

    .match {
      display: grid;
      grid-template-columns: 1fr 140px 1fr 180px;
      align-items: center;
      padding: 28px 35px;
      border-bottom: 1px solid #2a2a2a;
    }

    .match:last-child {
      border-bottom: none;
    }

    .team {
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .team.right {
      text-align: right;
    }

    .score {
      text-align: center;
      font-size: 34px;
      font-weight: 900;
      color: #b6ff00;
    }

    .league {
      text-align: right;
      color: #aaa;
      font-size: 14px;
    }

    .sets {
      grid-column: 1 / 5;
      text-align: center;
      margin-top: 12px;
      color: #999;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: #777;
    }

    footer {
      text-align: center;
      padding: 35px;
      color: #777;
      border-top: 1px solid #111;
    }

    @media (max-width: 800px) {
      header {
        flex-direction: column;
        padding: 30px 20px;
      }

      nav {
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
      }

      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }

      input {
        width: 100%;
      }

      .match {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 12px;
      }

      .team.right,
      .league {
        text-align: center;
      }

      .sets {
        grid-column: 1;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo" onclick="setRegion('Europe')">T<span>E</span>V</div>

    <nav>
      <button class="active" onclick="setRegion('Europe')">Europe</button>
      <button onclick="setRegion('Asia')">Asia</button>
      <button onclick="setRegion('North America')">North America</button>
    </nav>
  </header>

  <main>
    <div class="top-bar">
      <h1 id="pageTitle">Europe Volleyball</h1>
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search team or league..."
        oninput="renderMatches()"
      />
    </div>

    <div class="matches" id="matchesBox"></div>
  </main>

  <footer>
    © 2026 True Energy Volleyball
  </footer>

  <script>
    let currentRegion = "Europe";

    const matches = [
      {
        region: "Europe",
        team1: "Italy",
        team2: "Poland",
        score: "3 : 1",
        sets: "25-21  |  22-25  |  25-18  |  25-19",
        league: "CEV Champions League"
      },
      {
        region: "Europe",
        team1: "France",
        team2: "Germany",
        score: "2 : 3",
        sets: "25-20  |  20-25  |  25-23  |  18-25  |  12-15",
        league: "CEV Cup"
      },
      {
        region: "Asia",
        team1: "Japan",
        team2: "Korea",
        score: "3 : 0",
        sets: "25-19  |  25-21  |  25-18",
        league: "Asian Championship"
      },
      {
        region: "Asia",
        team1: "China",
        team2: "Thailand",
        score: "3 : 2",
        sets: "25-22  |  21-25  |  25-20  |  20-25  |  15-11",
        league: "AVC Cup"
      },
      {
        region: "North America",
        team1: "Canada",
        team2: "USA",
        score: "3 : 0",
        sets: "25-20  |  25-18  |  25-22",
        league: "NORCECA"
      },
      {
        region: "North America",
        team1: "Mexico",
        team2: "Cuba",
        score: "1 : 3",
        sets: "22-25  |  25-23  |  19-25  |  18-25",
        league: "Pan-American Cup"
      }
    ];

    function setRegion(region) {
      currentRegion = region;

      document.getElementById("pageTitle").textContent = region + " Volleyball";
      document.getElementById("searchInput").value = "";

      document.querySelectorAll("nav button").forEach(button => {
        button.classList.remove("active");

        if (button.textContent === region) {
          button.classList.add("active");
        }
      });

      renderMatches();
    }

    function renderMatches() {
      const searchValue = document
        .getElementById("searchInput")
        .value
        .toLowerCase();

      const filteredMatches = matches.filter(match => {
        return (
          match.region === currentRegion &&
          (
            match.team1.toLowerCase().includes(searchValue) ||
            match.team2.toLowerCase().includes(searchValue) ||
            match.league.toLowerCase().includes(searchValue)
          )
        );
      });

      const matchesBox = document.getElementById("matchesBox");

      if (filteredMatches.length === 0) {
        matchesBox.innerHTML = `
          <div class="empty">
            No matches found
          </div>
        `;
        return;
      }

      matchesBox.innerHTML = filteredMatches.map(match => `
        <div class="match">
          <div class="team">${match.team1}</div>
          <div class="score">${match.score}</div>
          <div class="team right">${match.team2}</div>
          <div class="league">${match.league}</div>
          <div class="sets">${match.sets}</div>
        </div>
      `).join("");
    }

    renderMatches();
  </script>

</body>
</html>
