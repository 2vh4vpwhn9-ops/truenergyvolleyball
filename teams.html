.team-grid{
    display:grid;

.team-card{

    background:#1d1d1d;

    border:2px solid #2b2b2b;

    border-radius:18px;

    padding:35px;

    text-align:center;

    transition:.3s;
}

.team-card:hover{

    border-color:#d8ff00;

    box-shadow:0 0 20px rgba(216,255,0,.25);

}

.flag{

    font-size:70px;

}

.team-card h2{

    margin:18px 0;

}

.team-card a{

    display:inline-block;

    margin-top:18px;

    padding:12px 26px;

    background:#d8ff00;

    color:black;

    text-decoration:none;

    border-radius:8px;

    font-weight:bold;

}

.team-card a:hover{

    background:white;

}

</style>
